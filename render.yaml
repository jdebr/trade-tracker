services:
  - type: web
    name: swing-trader-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python -m pytest -x -q
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: starter
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: TWELVE_DATA_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
